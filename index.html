<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>white note</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
  }
  #editor {
    display: block;
    width: 100vw;
    height: 100vh;
    margin: 0;
    padding: 16px;
    border: none;
    outline: none;
    resize: none;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
    font-size: 16px;
    line-height: 1.6;
    background: #ffffff;
    color: #222;
  }
</style>
</head>
<body>
<textarea id="editor" autofocus spellcheck="false" placeholder="ここに入力..."></textarea>
<script>
  const editor = document.getElementById('editor');
  const KEY = 'white-note:content';
  editor.value = localStorage.getItem(KEY) || '';
  editor.addEventListener('input', () => {
    localStorage.setItem(KEY, editor.value);
  });
</script>
</body>
</html>
