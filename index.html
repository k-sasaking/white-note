<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>white note</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
  }
  .wrap {
    position: relative;
    width: 100vw;
    height: 100vh;
  }
  .layer {
    position: absolute;
    inset: 0;
    margin: 0;
    padding: 16px;
    border: none;
    outline: none;
    box-sizing: border-box;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    font-size: 15px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow-wrap: break-word;
    tab-size: 2;
    -moz-tab-size: 2;
  }
  #highlight {
    z-index: 1;
    overflow: auto;
    background: #ffffff;
    color: #222;
    pointer-events: none;
    transition: background-color 160ms ease;
  }
  .wrap.is-code #highlight {
    background: #f6f8fa;
  }
  #highlight code {
    font: inherit;
    padding: 0;
    background: transparent;
    display: block;
    white-space: inherit;
  }
  #editor {
    z-index: 2;
    resize: none;
    background: transparent;
    color: transparent;
    caret-color: #222;
    overflow: auto;
  }
  #editor::selection {
    background: rgba(0, 120, 215, 0.3);
  }
</style>
</head>
<body>
<div class="wrap">
  <pre id="highlight" class="layer" aria-hidden="true"><code id="hl-code"></code></pre>
  <textarea id="editor" class="layer" autofocus spellcheck="false" placeholder="ここに入力..."></textarea>
</div>
<script>
  const editor = document.getElementById('editor');
  const hlPre = document.getElementById('highlight');
  const hlCode = document.getElementById('hl-code');
  const wrap = document.querySelector('.wrap');
  const KEY = 'white-note:content';

  const MIN_RELEVANCE = 5;

  function render(text) {
    const withTrailing = text.endsWith('\n') ? text + ' ' : text;
    if (text.trim().length === 0) {
      hlCode.textContent = withTrailing;
      hlCode.className = '';
      wrap.classList.remove('is-code');
      return;
    }
    const result = hljs.highlightAuto(withTrailing);
    if (result.relevance >= MIN_RELEVANCE) {
      hlCode.innerHTML = result.value;
      hlCode.className = 'hljs language-' + result.language;
      wrap.classList.add('is-code');
    } else {
      hlCode.textContent = withTrailing;
      hlCode.className = '';
      wrap.classList.remove('is-code');
    }
  }

  function syncScroll() {
    hlPre.scrollTop = editor.scrollTop;
    hlPre.scrollLeft = editor.scrollLeft;
  }

  editor.value = localStorage.getItem(KEY) || '';
  render(editor.value);

  editor.addEventListener('input', () => {
    localStorage.setItem(KEY, editor.value);
    render(editor.value);
    syncScroll();
  });
  editor.addEventListener('scroll', syncScroll);
</script>
</body>
</html>
